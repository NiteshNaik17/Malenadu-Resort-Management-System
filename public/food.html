<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Dining | Malenadu Resort</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            --veg-color: #27ae60;
            --non-veg-color: #c0392b;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8f9fa;
            color: #2d3436;
        }

        .hero-section {
            background: var(--primary-gradient);
            padding: 80px 0 120px;
            text-align: center;
            color: white;
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .menu-container {
            margin-top: -60px;
            position: relative;
            z-index: 10;
        }

        .category-switcher {
            background: white;
            padding: 8px;
            border-radius: 50px;
            display: inline-flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .category-btn {
            border: none;
            background: transparent;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #636e72;
            cursor: pointer;
        }

        .category-btn.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .food-card {
            background: white;
            border: none;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.5s ease;
            height: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .food-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .img-container {
            height: 220px;
            position: relative;
            overflow: hidden;
        }

        .food-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .food-card:hover .food-img {
            transform: scale(1.1);
        }

        .type-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .badge-veg { background: rgba(39, 174, 96, 0.9); color: white; }
        .badge-non-veg { background: rgba(192, 57, 43, 0.9); color: white; }

        .price-tag {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1a2a6c;
        }

        .cart-sticky {
            position: sticky;
            top: 100px;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .btn-order {
            background: var(--primary-gradient);
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-order:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .empty-state {
            padding: 60px;
            text-align: center;
            opacity: 0.6;
        }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-card {
            animation: fadeInUp 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.png" alt="Logo" width="40" height="40" class="me-2 rounded-circle bg-white p-1">
                Malenadu Resort
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="query.html">Contact Us</a></li>
                    <li class="nav-item" id="nav-food"><a class="nav-link active" href="food.html">Food Menu</a></li>
                    <li class="nav-item d-none" id="nav-login"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item d-none" id="nav-register"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="admin.html">Admin</a></li>
                    <li class="nav-item" id="nav-logout"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">Exquisite Dining</h1>
            <p class="lead opacity-75">Savor the finest culinary creations from our world-class chefs</p>
        </div>
    </div>

    <div class="container menu-container pb-5">
        <div class="row">
            <div class="col-12 text-center">
                <div class="category-switcher">
                    <button class="category-btn active" onclick="filterMenu('All')">Full Menu</button>
                    <button class="category-btn" onclick="filterMenu('Veg')">Veg Delights</button>
                    <button class="category-btn" onclick="filterMenu('Non-Veg')">Non-Veg Specialities</button>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Food Items Grid -->
            <div class="col-lg-8">
                <div class="row g-4" id="food-display">
                    <!-- Food items will be dynamically injected here -->
                </div>
            </div>

            <!-- Cart Section -->
            <div class="col-lg-4">
                <div class="cart-sticky">
                    <h4 class="mb-4 d-flex align-items-center">
                        <i class="bi bi-bag-heart me-2 text-danger"></i> Your Cart
                    </h4>
                    <div id="cart-items" class="mb-4">
                        <div class="empty-state">
                            <i class="bi bi-cart-x display-4 mb-3 d-block"></i>
                            <p>Empty cart? Let's fix that!</p>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-muted fw-bold">Total Payable</span>
                        <span class="price-tag h3 mb-0" id="cart-total">$0.00</span>
                    </div>
                    <button class="btn btn-primary btn-order w-100 btn-lg text-white" onclick="placeOrder()" id="checkout-btn" disabled>
                        Confirm Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Security check
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        let cart = [];
        let allFoods = [];
        let currentFilter = 'All';

        async function loadFoods() {
            try {
                const res = await fetch('/api/foods');
                allFoods = await res.json();
                renderMenu();
            } catch (err) {
                console.error(err);
                document.getElementById('food-display').innerHTML = '<div class="alert alert-danger">Unable to load the menu at this time.</div>';
            }
        }

        function filterMenu(type) {
            currentFilter = type;
            
            // Update UI buttons - using a more specific check
            document.querySelectorAll('.category-btn').forEach(btn => {
                const btnText = btn.innerText.trim();
                let isActive = false;
                
                if (type === 'All' && btnText === 'Full Menu') isActive = true;
                if (type === 'Veg' && btnText === 'Veg Delights') isActive = true;
                if (type === 'Non-Veg' && btnText === 'Non-Veg Specialities') isActive = true;
                
                if (isActive) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            renderMenu();
        }

        function renderMenu() {
            const display = document.getElementById('food-display');
            let filtered = allFoods;
            
            if(currentFilter !== 'All') {
                filtered = allFoods.filter(f => f.foodType === currentFilter);
            }

            if(filtered.length === 0) {
                display.innerHTML = `
                    <div class="col-12 text-center py-5 text-muted animate-card">
                        <i class="bi bi-search display-1 mb-3 d-block opacity-25"></i>
                        <h4>No items found in this category</h4>
                        <p>Try switching to another category or the full menu.</p>
                    </div>
                `;
                return;
            }

            display.innerHTML = filtered.map((food, index) => `
                <div class="col-md-6 animate-card" style="animation-delay: ${index * 0.1}s">
                    <div class="card food-card">
                        <div class="img-container">
                            <img src="${food.imageUrl}" class="food-img" alt="${food.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=800&q=80'">
                            <span class="type-badge ${food.foodType === 'Veg' ? 'badge-veg' : 'badge-non-veg'}">
                                ${food.foodType}
                            </span>
                        </div>
                        <div class="card-body p-4 d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold mb-0">${food.name}</h5>
                                <span class="price-tag text-primary">$${food.price}</span>
                            </div>
                            <p class="text-muted small mb-4 flex-grow-1">${food.description}</p>
                            <button class="btn btn-outline-primary rounded-pill fw-bold" onclick="addToCart('${food._id}')">
                                <i class="bi bi-plus-lg me-1"></i> Add to Order
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const food = allFoods.find(f => f._id === id);
            if (!food) return;

            const existingItem = cart.find(item => item.foodId === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    foodId: food._id,
                    name: food.name,
                    price: food.price,
                    quantity: 1
                });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            const checkoutBtn = document.getElementById('checkout-btn');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-cart-x display-4 mb-3 d-block"></i>
                        <p>Empty cart? Let's fix that!</p>
                    </div>
                `;
                totalDisplay.innerText = '$0.00';
                checkoutBtn.disabled = true;
                return;
            }

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                    <div class="d-flex justify-content-between align-items-center mb-3 animate-card">
                        <div>
                            <h6 class="mb-0 fw-bold">${item.name}</h6>
                            <small class="text-muted">$${item.price} × ${item.quantity}</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <span class="fw-bold me-2">$${(item.price * item.quantity).toFixed(2)}</span>
                            <button class="btn btn-sm text-danger" onclick="removeFromCart('${item.foodId}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            totalDisplay.innerText = '$' + total.toFixed(2);
            checkoutBtn.disabled = false;
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.foodId !== id);
            updateCartUI();
        }

        async function placeOrder() {
            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            try {
                const res = await fetch('/api/food-orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser._id,
                        items: cart,
                        totalAmount: totalAmount
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    alert(`Gourmet Order Placed! Your Order ID is: ${data.orderId}. Bon Appétit!`);
                    cart = [];
                    updateCartUI();
                } else {
                    alert('We encountered a minor issue with your order. Please try again.');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error. Please check your internet.');
            }
        }

        loadFoods();
    </script>
</body>
</html>
