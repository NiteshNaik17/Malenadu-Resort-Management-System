<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Query | Malenadu Resort</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.png" alt="Logo" width="40" height="40" class="me-2 rounded-circle bg-white p-1">
                Malenadu Resort
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link active" href="query.html">Contact Us</a></li>
                    <li class="nav-item d-none" id="nav-food"><a class="nav-link" href="food.html">Food Menu</a></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item" id="nav-register"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="admin.html">Admin</a></li>
                    <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);">
                        <h3>Customer Support</h3>
                        <p class="mb-0">Facing any issue? We're here to help.</p>
                    </div>
                    <div class="card-body p-5">
                        <div id="success-message" class="alert alert-success d-none mb-4 shadow-sm border-0" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i> Query submitted successfully!
                        </div>
                        <form id="query-form">
                            <div class="mb-3">
                                <label for="subject" class="form-label fw-bold">Subject</label>
                                <input type="text" class="form-control" id="subject" placeholder="What is the issue about?" required>
                            </div>
                            <div class="mb-4">
                                <label for="message" class="form-label fw-bold">Describe Your Problem</label>
                                <textarea class="form-control" id="message" rows="5" placeholder="Please provide details so we can assist you better..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                                Submit Query <i class="bi bi-send ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('query-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please login to submit a query.');
                window.location.href = 'login.html';
                return;
            }

            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            if (!user || !user._id) {
                alert('Session error. Please log in again.');
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('/api/queries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user._id, subject, message })
                });
                if (res.ok) {
                    // Show success message
                    document.getElementById('success-message').classList.remove('d-none');
                    document.getElementById('query-form').reset();
                    
                    // Refresh after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'query.html';
                    }, 2000);
                } else {
                    alert('Error submitting query. Please try again.');
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Toggle logout visibility
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('nav-logout').classList.remove('d-none');
        }
    </script>
</body>
</html>
